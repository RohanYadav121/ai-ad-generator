<!DOCTYPE html>
<html>
<head>
  <title>AI Ad Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    input {
      padding: 10px;
      width: 300px;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    pre {
      background: white;
      padding: 20px;
      width: 400px;
      margin: 20px auto;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>AI Ad Generator 🚀</h1>

  <input id="input" placeholder="Enter your product" />
  <button onclick="generate()">Generate</button>

  <pre id="output"></pre>

  <script>
    async function generate() {
      const product = document.getElementById("input").value;

      const res = await fetch("http://localhost:3000/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ product })
      });

      const data = await res.json();
      document.getElementById("output").innerText = data.result;
    }
  </script>

</body>
</html>
